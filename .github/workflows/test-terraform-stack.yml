name: Test Terraform Stack

on:
  push:
    branches: ["migration/secure-agentcore-v1"]
    paths:
      - "infra/environments/test/**"
      - "infra/modules/**"
      - ".github/workflows/test-terraform-stack.yml"
      - ".gitleaksignore"
  pull_request:
    branches: ["migration/secure-agentcore-v1"]
    paths:
      - "infra/environments/test/**"
      - "infra/modules/**"
      - ".github/workflows/test-terraform-stack.yml"
      - ".gitleaksignore"
  workflow_dispatch:
    inputs:
      stack_path:
        description: "Terraform stack path"
        required: true
        type: choice
        options:
          - infra/environments/test
        default: infra/environments/test
      action:
        description: "Terraform action"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy-plan
          - destroy
        default: plan
      confirm_destroy:
        description: "Required for destroy"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: test-terraform-stack-${{ github.ref }}-${{ inputs.stack_path || 'infra-environments-test' }}
  cancel-in-progress: false

env:
  DEFAULT_STACK_PATH: infra/environments/test
  TF_VERSION: "1.9.0"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  AWS_REGION: eu-west-3

jobs:
  secret-scan:
    name: Secret Scan Current Revision
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current revision only
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1

      - name: Gitleaks current revision scan
        uses: gitleaks/gitleaks-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Resolve stack path
        id: stack
        run: echo "path=${{ inputs.stack_path || env.DEFAULT_STACK_PATH }}" >> "$GITHUB_OUTPUT"

      - name: Terraform fmt
        working-directory: ${{ steps.stack.outputs.path }}
        run: terraform fmt -check -recursive

      - name: Terraform init without backend
        working-directory: ${{ steps.stack.outputs.path }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: ${{ steps.stack.outputs.path }}
        run: terraform validate

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && (inputs.action == 'plan' || inputs.action == 'apply'))
    permissions:
      contents: read
      id-token: write
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: test-terraform-plan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Resolve stack path
        id: stack
        run: echo "path=${{ inputs.stack_path || env.DEFAULT_STACK_PATH }}" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        working-directory: ${{ steps.stack.outputs.path }}
        run: terraform init

      - name: Terraform plan
        id: plan
        working-directory: ${{ steps.stack.outputs.path }}
        run: terraform plan -detailed-exitcode -out=tfplan -lock-timeout=60s
        continue-on-error: true

      - name: Fail on plan error
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

      - name: Upload plan
        if: steps.plan.outputs.exitcode == '0' || steps.plan.outputs.exitcode == '2'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ steps.stack.outputs.path }}/tfplan
          retention-days: 1

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: |
      github.event_name == 'workflow_dispatch' &&
      inputs.action == 'apply' &&
      github.ref == 'refs/heads/migration/secure-agentcore-v1' &&
      needs.terraform-plan.outputs.plan_exit_code == '2'
    environment:
      name: test
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: test-terraform-apply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Resolve stack path
        id: stack
        run: echo "path=${{ inputs.stack_path || env.DEFAULT_STACK_PATH }}" >> "$GITHUB_OUTPUT"

      - name: Download plan
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ steps.stack.outputs.path }}

      - name: Terraform init
        working-directory: ${{ steps.stack.outputs.path }}
        run: terraform init

      - name: Terraform apply
        working-directory: ${{ steps.stack.outputs.path }}
        run: terraform apply -auto-approve -lock-timeout=120s tfplan

  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: |
      github.event_name == 'workflow_dispatch' &&
      inputs.action == 'destroy' &&
      inputs.confirm_destroy == true &&
      github.ref == 'refs/heads/migration/secure-agentcore-v1'
    environment:
      name: test
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: test-terraform-destroy

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Resolve stack path
        id: stack
        run: echo "path=${{ inputs.stack_path || env.DEFAULT_STACK_PATH }}" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        working-directory: ${{ steps.stack.outputs.path }}
        run: terraform init

      - name: Terraform destroy
        working-directory: ${{ steps.stack.outputs.path }}
        run: terraform destroy -auto-approve -lock-timeout=120s
