# =============================================================================
# GitHub Actions — Secure AgentCore Test Terraform CI/CD
#
# Objectif : pipeline de validation et de déploiement TEST uniquement.
# La branche main reste réservée à la trajectoire production.
#
# Modes supportés :
# - push / pull_request : validation et scans uniquement ;
# - workflow_dispatch action=plan : Terraform plan test ;
# - workflow_dispatch action=apply : Terraform apply test avec GitHub Environment test ;
# - workflow_dispatch action=destroy : Terraform destroy test avec confirmation explicite.
#
# Prérequis GitHub :
# - Secret : AWS_ROLE_ARN
# - Environment : test avec Required Reviewer(s)
#
# Prérequis AWS OIDC :
# - rôle limité à l'environnement test ;
# - pas d'accès aux ressources prod ;
# - pas d'AdministratorAccess.
# =============================================================================

name: Secure AgentCore Test — Terraform CI/CD

on:
  push:
    branches: ["migration/secure-agentcore-v1"]
    paths:
      - "infra/environments/test/**"
      - "infra/modules/**"
      - ".github/workflows/secure-agentcore-test-deploy.yml"
  pull_request:
    branches: ["migration/secure-agentcore-v1"]
    paths:
      - "infra/environments/test/**"
      - "infra/modules/**"
      - ".github/workflows/secure-agentcore-test-deploy.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action for test environment"
        required: true
        type: choice
        options: [plan, apply, destroy]
        default: plan
      confirm_destroy:
        description: "Required only for destroy"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: secure-agentcore-test-terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_WORKING_DIR: infra/environments/test
  TF_IN_AUTOMATION: "true"
  TF_VERSION: "1.9.0"
  TF_INPUT: "false"
  AWS_REGION: eu-west-3
  CHECKOV_IMAGE: "bridgecrew/checkov@sha256:22b308dd96e158b446c6080d19ea41ffb609ebd46962c9ace43b9b6c8aaff5cf"

jobs:
  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Gitleaks — secret scan
        uses: gitleaks/gitleaks-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tf-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: secret-detection
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
          allowed-endpoints: >
            github.com:443
            releases.hashicorp.com:443
            registry.terraform.io:443
            checkpoint-api.hashicorp.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init without backend
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

  tf-trivy:
    name: Trivy IaC Security Scan
    runs-on: ubuntu-latest
    needs: [secret-detection, tf-validate]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: config
          scan-ref: ${{ env.TF_WORKING_DIR }}
          format: sarif
          output: trivy-iac-results.sarif
          severity: HIGH,CRITICAL
          exit-code: 0
          hide-progress: true

      - name: Upload Trivy SARIF
        if: success() && github.event.repository.private == false
        uses: github/codeql-action/upload-sarif@29d86d22a34ea372b1bbf3b2dced2e25ca6b3384
        with:
          sarif_file: trivy-iac-results.sarif
          category: trivy-iac

      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: trivy-iac-results-${{ github.run_id }}
          path: trivy-iac-results.sarif
          retention-days: 7

  tf-checkov:
    name: Checkov IaC Compliance
    runs-on: ubuntu-latest
    needs: [secret-detection, tf-validate]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
          allowed-endpoints: >
            github.com:443
            registry-1.docker.io:443
            auth.docker.io:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Checkov
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            ${{ env.CHECKOV_IMAGE }} \
              --directory /src/${{ env.TF_WORKING_DIR }} \
              --framework terraform \
              --output sarif \
              --output-file-path /src/${{ env.TF_WORKING_DIR }}/checkov-results.sarif

      - name: Upload Checkov SARIF
        if: success() && github.event.repository.private == false
        uses: github/codeql-action/upload-sarif@29d86d22a34ea372b1bbf3b2dced2e25ca6b3384
        with:
          sarif_file: ${{ env.TF_WORKING_DIR }}/checkov-results.sarif
          category: checkov

      - name: Upload Checkov report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: checkov-report-${{ github.run_id }}
          path: ${{ env.TF_WORKING_DIR }}/checkov-results.sarif
          retention-days: 7

  tf-plan:
    name: Terraform Plan Test
    runs-on: ubuntu-latest
    needs: [tf-trivy, tf-checkov]
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (inputs.action == 'plan' || inputs.action == 'apply'))
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exitcode }}
      artifact_name: tfplan-${{ github.run_id }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            releases.hashicorp.com:443
            registry.terraform.io:443
            checkpoint-api.hashicorp.com:443
            sts.amazonaws.com:443
            *.amazonaws.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: secure-agentcore-test-plan

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -detailed-exitcode \
            -out=tfplan \
            -lock-timeout=60s
        continue-on-error: true

      - name: Fail on Terraform error
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

      - name: Upload Terraform Plan artifact
        if: steps.plan.outputs.exitcode == '0' || steps.plan.outputs.exitcode == '2'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1

  infra-cost:
    name: Terraform Infra Cost Estimation
    runs-on: ubuntu-latest
    needs: [tf-plan]
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (inputs.action == 'plan' || inputs.action == 'apply'))
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            pricing.api.infracost.io:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Infracost CLI
        run: |
          curl -L -o infracost.tar.gz https://github.com/infracost/infracost/releases/latest/download/infracost-linux-amd64.tar.gz
          tar -xzf infracost.tar.gz
          sudo mv infracost-linux-amd64 /usr/local/bin/infracost
          infracost --version

      - name: Infracost auth
        run: infracost configure set api_key ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate cost report
        run: |
          infracost breakdown \
            --path ${{ env.TF_WORKING_DIR }} \
            --format json \
            --out-file infracost.json

      - name: Upload Infracost report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: infracost-report-${{ github.run_id }}
          path: infracost.json
          retention-days: 7

  tf-apply:
    name: Terraform Apply Test
    runs-on: ubuntu-latest
    needs: [tf-plan]
    if: |
      github.event_name == 'workflow_dispatch' &&
      inputs.action == 'apply' &&
      github.ref == 'refs/heads/migration/secure-agentcore-v1' &&
      needs.tf-plan.outputs.plan_exit_code == '2'
    environment:
      name: test
      url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            releases.hashicorp.com:443
            registry.terraform.io:443
            sts.amazonaws.com:443
            *.amazonaws.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600
          role-session-name: secure-agentcore-test-apply

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Download Terraform Plan artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -lock-timeout=120s tfplan

      - name: Save errored state on failure
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: failure()
        with:
          name: errored-state-${{ github.run_id }}
          path: ${{ env.TF_WORKING_DIR }}/errored.tfstate
          retention-days: 7

  tf-destroy:
    name: Terraform Destroy Test
    runs-on: ubuntu-latest
    needs: [secret-detection, tf-validate]
    if: |
      github.event_name == 'workflow_dispatch' &&
      inputs.action == 'destroy' &&
      inputs.confirm_destroy == true &&
      github.ref == 'refs/heads/migration/secure-agentcore-v1'
    environment:
      name: test
      url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            releases.hashicorp.com:443
            registry.terraform.io:443
            sts.amazonaws.com:443
            *.amazonaws.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600
          role-session-name: secure-agentcore-test-destroy

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform destroy -auto-approve -lock-timeout=120s
