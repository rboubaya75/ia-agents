name: Commit Lint

on:
  push:
    branches-ignore: [main]   # toutes les branches
  pull_request:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  commitlint:
    name: 📝 Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yaml
